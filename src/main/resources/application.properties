spring.application.name=Quick-Bite
server.port= 8080


# MySQL Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/Quick-Bite?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=mysql123

# Use the modern MySQL 8 CJ driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# Optional: View SQL queries in the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

